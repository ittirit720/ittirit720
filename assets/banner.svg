<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="50%" style="stop-color:#161B22"/>
      <stop offset="100%" style="stop-color:#0D1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EA4AAA"/>
      <stop offset="50%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EA4AAA;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- Glow effect top-left -->
  <ellipse cx="200" cy="160" rx="300" ry="200" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#1F2937" stroke-width="1" opacity="0.4">
    <line x1="0" y1="64" x2="1280" y2="64"/>
    <line x1="0" y1="128" x2="1280" y2="128"/>
    <line x1="0" y1="192" x2="1280" y2="192"/>
    <line x1="0" y1="256" x2="1280" y2="256"/>
    <line x1="256" y1="0" x2="256" y2="320"/>
    <line x1="512" y1="0" x2="512" y2="320"/>
    <line x1="768" y1="0" x2="768" y2="320"/>
    <line x1="1024" y1="0" x2="1024" y2="320"/>
  </g>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#accent)"/>

  <!-- Left decorative bracket -->
  <text x="60" y="210" font-family="monospace" font-size="120" fill="#EA4AAA" opacity="0.08">{"}</text>

  <!-- Main title -->
  <text x="100" y="140" font-family="'Segoe UI', system-ui, sans-serif" font-size="42" font-weight="700" fill="white" letter-spacing="-1">Ittirit Saengow</text>

  <!-- Subtitle -->
  <text x="100" y="180" font-family="'Segoe UI', system-ui, sans-serif" font-size="20" font-weight="400" fill="#9CA3AF">The Architect Who Couldn't Code</text>

  <!-- Gradient line under subtitle -->
  <rect x="100" y="192" width="400" height="2" fill="url(#accent)" rx="1"/>

  <!-- FDIA equation -->
  <text x="100" y="240" font-family="monospace" font-size="22" fill="#6EE7B7" font-weight="500">F = D^I × A</text>
  <text x="100" y="265" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#6B7280">Intent-Centric AI Operating System · RCT Ecosystem v5.4.5</text>

  <!-- Right side — stats box -->
  <rect x="820" y="60" width="380" height="190" rx="12" fill="#161B22" stroke="#30363D" stroke-width="1"/>

  <!-- Stats header -->
  <text x="840" y="92" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#8B949E" font-weight="600" letter-spacing="2">METRICS</text>

  <!-- Stat rows -->
  <text x="840" y="122" font-family="monospace" font-size="13" fill="#E6EDF3">🧪 4,849 tests</text>
  <text x="1050" y="122" font-family="monospace" font-size="13" fill="#3FB950">passed · 0 failed</text>

  <text x="840" y="148" font-family="monospace" font-size="13" fill="#E6EDF3">⚡ 0.3% hallucination</text>
  <text x="1050" y="148" font-family="monospace" font-size="13" fill="#58A6FF">vs 12-15% industry</text>

  <text x="840" y="174" font-family="monospace" font-size="13" fill="#E6EDF3">🤖 7 HexaCore models</text>
  <text x="1050" y="174" font-family="monospace" font-size="13" fill="#D2A8FF">multilingual</text>

  <text x="840" y="200" font-family="monospace" font-size="13" fill="#E6EDF3">🌏 8 regional markets</text>
  <text x="1050" y="200" font-family="monospace" font-size="13" fill="#FFA657">ASEAN + JP/KR/CN</text>

  <text x="840" y="226" font-family="monospace" font-size="13" fill="#E6EDF3">🏗️ 10-layer AI OS</text>
  <text x="1050" y="226" font-family="monospace" font-size="13" fill="#EA4AAA">Apache 2.0</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="317" width="1280" height="3" fill="url(#accent)"/>

  <!-- Location tag -->
  <text x="100" y="305" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#6B7280">📍 Khlong Toei, Bangkok, Thailand 🇹🇭 · github.com/rctlabs · rctlabs.co</text>
</svg>
